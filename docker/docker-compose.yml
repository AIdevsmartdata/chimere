# =============================================================================
# Chimere Stack — The self-improving AI inference engine
#
# Full stack: Chimere inference + ODO routing + DVTS verification +
#             search augmentation (CRAG) + nightly self-improvement +
#             Web UI + vector DB
#
# Quick start:
#   1. Download model: huggingface-cli download Kevletesteur/Qwen3.5-35B-A3B-Chimere-v3-GGUF chimere-v3-ramp.gguf
#   2. docker compose up -d
#   3. Open http://localhost:3000 (Web UI)
#
# Architecture:
#   User → Open WebUI (3000) → ODO (8084) → Chimere (8081)
#                                  ├── SearXNG (deep search, CRAG)
#                                  ├── ChromaDB (RAG, vector search)
#                                  ├── DVTS (verification, ThinkPRM scorer)
#                                  └── Engram (hierarchical memory)
#                               Nightly (00:30) → LoRA + Engram + GRPO + DSPy
# =============================================================================

networks:
  chimere-net:
    driver: bridge

volumes:
  chimere-models:
  chimere-engram:
  chimere-logs:
  chimere-soul:
  chimere-chromadb:
  chimere-training:
  chimere-search-cache:
  open-webui-data:

services:
  # ---------------------------------------------------------------------------
  # 1. Chimere Server -- Rust inference engine with Engram + custom sampling
  # ---------------------------------------------------------------------------
  chimere:
    build:
      context: ..
      dockerfile: docker/inference/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "${CHIMERE_PORT:-8081}:8081"
    environment:
      CHIMERE_MODEL: /models/${MODEL_FILENAME:-model.gguf}
      CHIMERE_TOKENIZER: /models/tokenizer.json
      CHIMERE_PORT: "8081"
      CHIMERE_LLAMA_BACKEND: "1"
      CHIMERE_KV_MAX_SEQ: ${CHIMERE_CTX:-32768}
      CHIMERE_NCMOE: ${CHIMERE_NCMOE:-4}
      CHIMERE_KV_TYPE_K: "8"
      CHIMERE_KV_TYPE_V: "2"
      CHIMERE_FLASH_ATTN: "1"
      CHIMERE_BATCH: ${CHIMERE_BATCH:-4096}
      CHIMERE_UBATCH: ${CHIMERE_UBATCH:-512}
      CHIMERE_THREADS: ${CHIMERE_THREADS:-8}
    volumes:
      - chimere-models:/models
      - chimere-engram:/data/engram
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 5
    restart: unless-stopped
    networks:
      - chimere-net

  # ---------------------------------------------------------------------------
  # 2. ODO -- One Door Orchestrator
  #    Intent classification → pipeline routing → Engram injection →
  #    DVTS verification → search augmentation (CRAG) → quality gate
  # ---------------------------------------------------------------------------
  odo:
    build:
      context: ../../chimere-odo
      dockerfile: Dockerfile
    ports:
      - "${ODO_PORT:-8084}:8084"
    environment:
      ODO_BACKEND: http://chimere:8081
      ODO_PORT: "8084"
      SOUL_DIR: /data/soul
      CHIMERE_HOME: /data
      # Search augmentation (CRAG pipeline)
      SEARXNG_URL: http://searxng:8080
      CHROMADB_URL: http://chromadb:8000
      SEARCH_CACHE_DIR: /data/search-cache
      # DVTS (Diverse Verifier Tree Search)
      DVTS_ENABLED: ${DVTS_ENABLED:-true}
      DVTS_CANDIDATES: ${DVTS_CANDIDATES:-4}
      DVTS_SCORER_URL: http://scorer:8085
      # Engram
      ENGRAM_DIR: /data/engram
      ENGRAM_ALPHA: ${ENGRAM_ALPHA:-0.3}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    volumes:
      - chimere-engram:/data/engram
      - chimere-logs:/data/logs
      - chimere-soul:/data/soul
      - chimere-search-cache:/data/search-cache
    depends_on:
      chimere:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chimere-net

  # ---------------------------------------------------------------------------
  # 2b. Scorer -- Small model for DVTS verification + nightly evaluation
  #     Runs on CPU, always available alongside the main GPU model.
  #     Used by DVTS (step-level scoring) and nightly (response quality).
  # ---------------------------------------------------------------------------
  scorer:
    build:
      context: ..
      dockerfile: docker/inference/Dockerfile
    environment:
      CHIMERE_MODEL: /models/${SCORER_MODEL:-scorer.gguf}
      CHIMERE_TOKENIZER: /models/tokenizer.json
      CHIMERE_PORT: "8085"
      CHIMERE_LLAMA_BACKEND: "1"
      CHIMERE_KV_MAX_SEQ: "4096"
      CHIMERE_NCMOE: "0"
      CHIMERE_THREADS: "6"
    volumes:
      - chimere-models:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3
    restart: unless-stopped
    networks:
      - chimere-net

  # ---------------------------------------------------------------------------
  # 3. Open WebUI -- Chat interface
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      OPENAI_API_BASE_URLS: http://odo:8084/v1
      OPENAI_API_KEYS: chimere-local
      WEBUI_AUTH: "false"
      ENABLE_RAG_WEB_SEARCH: "false"
      DEFAULT_MODELS: chimere-default
      ENABLE_SIGNUP: "false"
      SAFE_MODE: "true"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      odo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chimere-net

  # ---------------------------------------------------------------------------
  # 4. SearXNG -- Meta-search engine (used by ODO for web search)
  # ---------------------------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    ports:
      - "${SEARXNG_PORT:-8888}:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    networks:
      - chimere-net

  # ---------------------------------------------------------------------------
  # 5. Nightly -- Self-improvement pipeline (runs daily at NIGHTLY_SCHEDULE)
  #
  #    Phase 1: Score all responses from the day (scorer on CPU)
  #    Phase 2: Engram update (MDL-gated, adds entries when prediction error high)
  #    Phase 3: LoRA fine-tune on high-quality pairs (GPU swap with chimere)
  #    Phase 4: GRPO training with verifiable rewards (tool-call accuracy, etc.)
  #    Phase 5: DSPy prompt optimization (optional)
  #    Phase 6: MeZO zeroth-order LoRA (no gradients needed, optional)
  # ---------------------------------------------------------------------------
  nightly:
    build:
      context: ../../chimere-odo
      dockerfile: ../chimere/docker/nightly/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      NIGHTLY_SCHEDULE: ${NIGHTLY_SCHEDULE:-00:30}
      # Self-improvement modules
      NIGHTLY_ENGRAM: ${NIGHTLY_ENGRAM:-true}
      NIGHTLY_LORA: ${NIGHTLY_LORA:-true}
      NIGHTLY_GRPO: ${NIGHTLY_GRPO:-false}
      NIGHTLY_DSPY: ${NIGHTLY_DSPY:-false}
      NIGHTLY_MEZO: ${NIGHTLY_MEZO:-false}
      # Connections
      ODO_BACKEND: http://chimere:8081
      SCORER_URL: http://scorer:8085
      CHROMADB_URL: http://chromadb:8000
      CHIMERE_HOME: /data
      # GRPO config
      GRPO_CANDIDATES: ${GRPO_CANDIDATES:-4}
      GRPO_EPOCHS: ${GRPO_EPOCHS:-1}
    volumes:
      - chimere-logs:/data/logs
      - chimere-engram:/data/engram
      - chimere-soul:/data/soul
      - chimere-training:/data/training
      - chimere-models:/models
    depends_on:
      chimere:
        condition: service_healthy
      scorer:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chimere-net

  # ---------------------------------------------------------------------------
  # 6. ChromaDB -- Vector database for RAG
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chimere-chromadb:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    restart: unless-stopped
    networks:
      - chimere-net
