[package]
name = "chimere-deltanet"
version = "0.1.0"
edition = "2021"
description = "Gated DeltaNet attention for Chimère Engine"

[dependencies]
candle-core = { git = "https://github.com/huggingface/candle.git", features = ["cuda"] }
candle-nn = { git = "https://github.com/huggingface/candle.git", features = ["cuda"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
safetensors = "0.4"
memmap2 = "0.9"
byteorder = "1"
ggml-ffi = { path = "ffi" }
half = { version = "2", features = ["num-traits"] }
rand = "0.9"
tokenizers = "0.21"
once_cell = "1"
# Server feature deps (optional)
tokio = { version = "1", features = ["full"], optional = true }
axum = { version = "0.8", optional = true }
futures = { version = "0.3", optional = true }

[features]
cubin_fallback = []
server = ["tokio", "axum", "futures"]

[[bin]]
name = "chimere-server"
path = "src/bin/chimere-server.rs"
required-features = ["server"]

[[bin]]
name = "bench-mtp"
path = "src/bin/bench_mtp.rs"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
